name: Sentinel Watcher
run-name: Sentinel Watcher — ${{ inputs.scan_id || 'scheduled' }}

on:
  workflow_dispatch:
    inputs:
      scan_id:
        description: Unique scan identifier used by the website dashboard
        required: false
        type: string
      research_query:
        description: Unknown mod or plugin name requested by Sentinel Expert
        required: false
        type: string
      research_request_id:
        description: Unique Sentinel Expert research request identifier
        required: false
        type: string
  schedule:
    - cron: '23 9 * * *'

permissions:
  contents: write

concurrency:
  group: sentinel-watcher
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Research unknown project
        if: ${{ inputs.research_query != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTINEL_RESEARCH_QUERY: ${{ inputs.research_query }}
          SENTINEL_RESEARCH_REQUEST_ID: ${{ inputs.research_request_id }}
          SENTINEL_RESEARCH_SCAN_ID: ${{ inputs.scan_id }}
        run: node scripts/sentinel-research.mjs
      - name: Fast parallel source scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sentinel-watcher.mjs
      - name: Add report to run summary
        if: always()
        run: cat sentinel-watcher/reports/latest.md >> "$GITHUB_STEP_SUMMARY"
      - name: Publish latest dashboard data
        if: success()
        run: |
          git config user.name "sentinel-watcher[bot]"
          git config user.email "sentinel-watcher[bot]@users.noreply.github.com"
          git add static/data/watcher-report.json static/data/watcher-history.json static/data/research-results.json sentinel-watcher/state.json
          if git diff --cached --quiet; then
            echo "No watcher data changes to publish."
          else
            git commit -m "chore(watcher): refresh monitoring data"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Upload watcher report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: sentinel-watcher-report
          path: |
            sentinel-watcher/reports/latest.json
            sentinel-watcher/reports/latest.md
            sentinel-watcher/reports/review-queue.json
            sentinel-watcher/reports/changes.json
          retention-days: 30
