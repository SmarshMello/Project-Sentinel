name: Sentinel Watcher

on:
  workflow_dispatch:
  schedule:
    - cron: '23 9 * * 1'

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Scan tracked sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sentinel-watcher.mjs
      - name: Add report to run summary
        run: cat sentinel-watcher/reports/latest.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload watcher report
        uses: actions/upload-artifact@v6
        with:
          name: sentinel-watcher-report
          path: |
            sentinel-watcher/reports/latest.json
            sentinel-watcher/reports/latest.md
          retention-days: 30
